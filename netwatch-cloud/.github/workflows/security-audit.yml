name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Rust security audit
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings
        continue-on-error: false

      # Optional: Show outdated Rust dependencies (informational)
      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check outdated Rust dependencies
        run: cargo outdated --root-deps
        continue-on-error: true

      # Node/npm security audit (if package.json exists)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check for package.json
        id: npm-check
        run: |
          if [ -f "package.json" ]; then
            echo "has-npm=true" >> $GITHUB_OUTPUT
          else
            echo "has-npm=false" >> $GITHUB_OUTPUT
          fi

      - name: Run npm audit
        if: steps.npm-check.outputs.has-npm == 'true'
        run: npm audit --production
        continue-on-error: false

      # Generate summary
      - name: Summary
        if: always()
        run: |
          echo "## Security Audit Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Cargo audit: Completed" >> $GITHUB_STEP_SUMMARY
          if [ -f "package.json" ]; then
            echo "✅ NPM audit: Completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⊘ NPM audit: Skipped (no package.json found)" >> $GITHUB_STEP_SUMMARY
          fi

  # Status check for branch protection
  security-audit-status:
    name: Security Audit Status
    runs-on: ubuntu-latest
    needs: audit
    if: always()
    steps:
      - name: Check audit results
        run: |
          if [ "${{ needs.audit.result }}" == "failure" ]; then
            echo "Security audit failed!"
            exit 1
          else
            echo "Security audit passed!"
            exit 0
          fi
