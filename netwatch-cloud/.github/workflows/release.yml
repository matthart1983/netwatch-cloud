name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: netwatch-cloud
            use_cross: false

          # Linux aarch64-gnu (ARM64)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: netwatch-cloud
            use_cross: true

          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: netwatch-cloud
            use_cross: false

          # macOS aarch64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: netwatch-cloud
            use_cross: false

          # Windows x86_64 (MSVC)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: netwatch-cloud.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (if needed)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --package netwatch-cloud
          else
            cargo build --release --target ${{ matrix.target }} --package netwatch-cloud
          fi
        shell: bash

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create binary with versioned name
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" \
               "netwatch-agent-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" \
               "netwatch-agent-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}"
          fi
        shell: bash

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            FILE="netwatch-agent-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.exe"
            CHECKSUM=$(certutil -hashfile "$FILE" SHA256 | findstr /R "^[a-fA-F0-9]" | cut -d' ' -f1)
          else
            FILE="netwatch-agent-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}"
            CHECKSUM=$(shasum -a 256 "$FILE" | cut -d' ' -f1)
          fi
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "$CHECKSUM  $FILE" > checksum.txt
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            netwatch-agent-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}*
            checksum.txt
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare files for release
        run: |
          mkdir -p release-files
          
          # Copy all binaries
          find artifacts -type f -name "netwatch-cloud-*" ! -name "*.txt" -exec cp {} release-files/ \;
          
          # Combine all checksums
          echo "# SHA256 Checksums" > release-files/checksums.txt
          echo "" >> release-files/checksums.txt
          find artifacts -name "checksum.txt" -exec cat {} >> release-files/checksums.txt \;

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Determine pre-release flag
        id: prerelease
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [[ "$VERSION" =~ ^v0\. ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes from CHANGES.md
        id: notes
        run: |
          if [ -f "CHANGES.md" ]; then
            echo "NOTES<<EOF" >> $GITHUB_OUTPUT
            head -n 50 CHANGES.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "NOTES=Release of ${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          draft: false
          prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE }}
          body: |
            # Release ${{ steps.version.outputs.VERSION }}

            ## Binaries

            Cross-platform binaries are available below. Verify using `checksums.txt`:

            ```bash
            sha256sum -c checksums.txt
            ```

            ## Supported Platforms

            - Linux x86_64 (GNU)
            - Linux aarch64 (ARM64, GNU)
            - macOS x86_64
            - macOS aarch64 (Apple Silicon)
            - Windows x86_64 (MSVC)

            ## Installation

            Download the appropriate binary for your platform and place it in your PATH:

            ```bash
            # Example: Linux x86_64
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/netwatch-cloud-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu
            chmod +x netwatch-cloud-*
            sudo mv netwatch-cloud-* /usr/local/bin/netwatch-cloud
            ```

            ## Verification

            Verify binary integrity using SHA256:

            ```bash
            # Download checksums
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/checksums.txt
            
            # Verify
            sha256sum -c checksums.txt
            ```

            ${{ steps.notes.outputs.NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
